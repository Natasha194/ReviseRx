    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }
    body {
        background-image: url('Untitled design copy.png');
    }

    .header {
        width: 100%;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background-color: #9cc393;
        box-shadow: 10px 10px 20px 1px #4c4c4c;
    }

    nav {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 8%;
    }

    nav .logo {
        display: flex;
        align-items: center;
        font-size: 1.6rem;
        font-weight: 600;
        color: rgb(0, 0, 0);
    }

    nav .logo img {
        width: 50px;
        margin-right: 10px;
    }

    nav ul {
        display: flex;
    }

    nav ul li {
        list-style: none;
        margin: 10px 20px;
    }

    nav ul li a {
        text-decoration: none;
        color: #000000;
        font-weight: 500;
    }
    nav ul li a:hover {
        text-decoration: none;
        color: black;
    }

    .menu-toggle {
        display: none;
        flex-direction: column;
        cursor: pointer;
    }

    .menu-toggle span {
        width: 25px;
        height: 3px;
        background-color: white;
        margin: 4px;
        transition: all 0.3s ease;
    }

    .menu-toggle.active span:nth-child(1) {
        transform: rotate(45deg);
        top: 5px;
        position: relative;
    }

    .menu-toggle.active span:nth-child(2) {
        opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
        transform: rotate(-45deg);
        top: -5px;
        position: relative;
    }

    .overlay {
        height: 100%;
        width: 0;
        position: fixed;
        z-index: 1;
        top: 0;
        left: 0;
        background-color:#99A598;
        overflow-x: hidden;
        transition: 0.5s;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .overlay-content {
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
    }

    .overlay-content a {
        padding: 8px;
        text-decoration: none;
        font-size: 36px;
        color: white;
        display: block;
        transition: 0.3s;
    }

    .overlay-content a:hover, .overlay-content a:focus {
        color: #f1f1f1;
    }

    .overlay .closebtn {
        position: absolute;
        top: 20px;
        right: 45px;
        font-size: 60px;
        cursor: pointer;
        color: white;
    }




    .content h1 {
        font-size: 60%;
        line-height: 1.2;
        font-weight: 600;
        font-family: 'MonteCarlo';
        font-size: 48px;
        color: #000000;

    }

    .content p {
        line-height: 1.6;
        opacity: 0;
        animation-delay: 1s;
        color: #000000;
    }

    .links {
        margin-top: 30px;
        opacity: 0;
    }

    .links a {
        color: white;
        text-decoration: none;
        display: inline-block;
        transition: background 1s;
    }

    .btn {
        border: 2px solid white;
        padding: 10px 35px;
        border-radius: 30px;
        margin-right: 15px;
    }

    .slide-right {
        animation: slideright 1s linear forwards;
        animation-delay: 1s;
        opacity: 0;
    }

    @keyframes slideright {
        0% {
            transform: translate(100px);
            opacity: 0;
        }
        100% {
            transform: translate(0px);
            opacity: 1;
        }
    }

    .slide-left {
        animation: slideleft 1s linear forwards;
    }

    @keyframes slideleft {
        0% {
            transform: translateX(-100px);
            opacity: 0;
        }
        100% {
            transform: translateX(0px);
            opacity: 1;
        }
    }





    @media (max-width: 768px) {
        nav ul {
            display: none;
            flex-direction: column;
            width: 100%;
            text-align: center;
        }

        .menu-toggle {
            display: flex;
        }

        .main-content {
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }




        .btn {
            padding: 8px 30px;
        }


    }

    @media (min-width: 769px) {
        .feature-img {
            width: 400px;
            position: absolute;
            bottom: 40px;
            right: 5%;
        }
    }
    .links a:hover {
        background-color: #2F005D;
        color: white;
    }

</style>



<script>
    const menuToggle = document.getElementById('menu-toggle');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closebtn');

    menuToggle.addEventListener('click', () => {
        overlay.style.width = '100%';
    });

    closeBtn.addEventListener('click', () => {
        overlay.style.width = '0';
    });
</script>
