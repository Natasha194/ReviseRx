<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Editor</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        #editor-container {
            height: 400px;
        }
        .ql-custom-size {
            width: 60px;
        }
        #color-picker, #bg-color-picker {
            margin-left: 10px;
        }
        body {
            background-color: #CDDBCC;
        }
    </style>
</head>
<body>
    <div class="header">
        <nav>
            <a href="index.html"><div class="logo">
                <img src="logo.png" alt="" style="width: 100px;">
                
            </div></a>
            <ul class="nav-links">
                <b><li><a href="resources.html">Resources</a></li></b>
                <b><li><a href="toDoList.html">To Do Lists</a></li></b>
                
            </ul>
            <div class="menu-toggle" id="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <div class="overlay" id="overlay">
            <span class="closebtn" id="closebtn">&times;</span>
            <div class="overlay-content">
                <a href="resources.html">Resources</a>
                <a href="toDoList.html">To Do Lists</a>
            </div>
        </div>

            
        
    </div> 









    <!-- Heading for list name -->
     <br>
    <center><h1 id="list-name-heading"></h1></center>
    <br>
<div style="margin-left: 30px; margin-right: 30px;">
    <div id="toolbar" style="background-color: #e9e9e9;">
        <button class="ql-bold">B</button>
        <button class="ql-italic">I</button>
        <button class="ql-underline">U</button>

        <!-- Text color dropdown and color picker -->
        <select class="ql-color"></select>
        <input type="color" id="color-picker" title="Pick a text color">

        <!-- Background color (highlighter) dropdown and color picker -->
        <select class="ql-background"></select>
        <input type="color" id="bg-color-picker" title="Pick a background color">

        <!-- Other toolbar options -->
        <button class="ql-list" value="ordered">Ordered</button>
        <button class="ql-list" value="bullet">Bullet</button>
        <button class="ql-list" value="check">Checklist</button>

        <!-- Font size input -->
        <input class="ql-custom-size" type="number" min="8" max="72" placeholder="Size (px)">
    </div>

    <div id="editor-container" style="background-color: #e9e9e9;"></div>
    <br>

    <button id="save-button" style="padding: 7px; width: 7%; background-color: #99A598; border: 1px solid #000000;">Save</button>
</div> 
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="list.js"></script>

</body>
</html>









<style>
    #save-button:hover{
        cursor: pointer;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    .header {
        width: 100%;

        background-color: #99A598;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    nav {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 8%;
    }

    nav .logo {
        display: flex;
        align-items: center;
        font-size: 1.6rem;
        font-weight: 600;
        color: white;
    }

    nav .logo img {
        width: 50px;
        margin-right: 10px;
    }

    nav ul {
        display: flex;
    }

    nav ul li {
        list-style: none;
        margin: 10px 20px;
    }

    nav ul li a {
        text-decoration: none;
        color: #000000;
        font-weight: 500;
    }
    nav ul li a:hover {
        text-decoration: none;
        color: black;
    }

    .menu-toggle {
        display: none;
        flex-direction: column;
        cursor: pointer;
    }

    .menu-toggle span {
        width: 25px;
        height: 3px;
        background-color: white;
        margin: 4px;
        transition: all 0.3s ease;
    }

    .menu-toggle.active span:nth-child(1) {
        transform: rotate(45deg);
        top: 5px;
        position: relative;
    }

    .menu-toggle.active span:nth-child(2) {
        opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
        transform: rotate(-45deg);
        top: -5px;
        position: relative;
    }

    .overlay {
        height: 100%;
        width: 0;
        position: fixed;
        z-index: 1;
        top: 0;
        left: 0;
        background-color:#99A598;
        overflow-x: hidden;
        transition: 0.5s;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .overlay-content {
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
    }

    .overlay-content a {
        padding: 8px;
        text-decoration: none;
        font-size: 36px;
        color: white;
        display: block;
        transition: 0.3s;
    }

    .overlay-content a:hover, .overlay-content a:focus {
        color: #f1f1f1;
    }

    .overlay .closebtn {
        position: absolute;
        top: 20px;
        right: 45px;
        font-size: 60px;
        cursor: pointer;
        color: white;
    }




    .content h1 {
        font-size: 60%;
        line-height: 1.2;
        font-weight: 600;
        font-family: 'MonteCarlo';
        font-size: 48px;
        color: #000000;

    }

    .content p {
        line-height: 1.6;
        opacity: 0;
        animation-delay: 1s;
        color: #000000;
    }

    .links {
        margin-top: 30px;
        opacity: 0;
    }

    .links a {
        color: white;
        text-decoration: none;
        display: inline-block;
        transition: background 1s;
    }

    .btn {
        border: 2px solid white;
        padding: 10px 35px;
        border-radius: 30px;
        margin-right: 15px;
    }

    .slide-right {
        animation: slideright 1s linear forwards;
        animation-delay: 1s;
        opacity: 0;
    }

    @keyframes slideright {
        0% {
            transform: translate(100px);
            opacity: 0;
        }
        100% {
            transform: translate(0px);
            opacity: 1;
        }
    }

    .slide-left {
        animation: slideleft 1s linear forwards;
    }

    @keyframes slideleft {
        0% {
            transform: translateX(-100px);
            opacity: 0;
        }
        100% {
            transform: translateX(0px);
            opacity: 1;
        }
    }





    @media (max-width: 768px) {
        nav ul {
            display: none;
            flex-direction: column;
            width: 100%;
            text-align: center;
        }

        .menu-toggle {
            display: flex;
        }

        .main-content {
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }




        .btn {
            padding: 8px 30px;
        }


    }

    @media (min-width: 769px) {
        .feature-img {
            width: 400px;
            position: absolute;
            bottom: 40px;
            right: 5%;
        }
    }
    .links a:hover {
        background-color: #2F005D;
        color: white;
    }

</style>



<script>
    const menuToggle = document.getElementById('menu-toggle');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closebtn');

    menuToggle.addEventListener('click', () => {
        overlay.style.width = '100%';
    });

    closeBtn.addEventListener('click', () => {
        overlay.style.width = '0';
    });
</script>
